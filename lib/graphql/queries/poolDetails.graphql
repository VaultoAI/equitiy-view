query PoolDetails($poolId: ID!) {
  pool(id: $poolId) {
    id
    token0 {
      id
      symbol
      name
      decimals
    }
    token1 {
      id
      symbol
      name
      decimals
    }
    feeTier
    totalValueLockedUSD
    txCount
    token0Price
    token1Price
    poolDayData(
      orderBy: date
      orderDirection: desc
      first: 30
    ) {
      date
      volumeUSD
      feesUSD
      tvlUSD
      token0Price
      token1Price
      open
      high
      low
      close
    }
    poolHourData(
      orderBy: periodStartUnix
      orderDirection: desc
      first: 49
    ) {
      periodStartUnix
      volumeUSD
      feesUSD
    }
  }
}


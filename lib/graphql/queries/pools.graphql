query TopV3Pools($first: Int!, $tokenAddress: String!) {
  pools(
    first: $first
    where: {
      or: [
        { token0_: { id: $tokenAddress } }
        { token1_: { id: $tokenAddress } }
      ]
    }
    orderBy: totalValueLockedUSD
    orderDirection: desc
  ) {
    id
    token0 {
      id
      symbol
      name
      decimals
    }
    token1 {
      id
      symbol
      name
      decimals
    }
    feeTier
    totalValueLockedUSD
    txCount
    poolDayData(
      orderBy: date
      orderDirection: desc
      first: 30
    ) {
      date
      volumeUSD
      feesUSD
    }
  }
}


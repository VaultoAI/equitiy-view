# Netlify Configuration
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = ".next"

# Redirect API requests to Netlify Functions
[[redirects]]
  from = "/api/stockdata-org"
  to = "/.netlify/functions/stockdata-org"
  status = 200

# Disable Next.js Image Optimization API (not supported on static hosting)
# Return 404 for image optimization requests to prevent 400 errors
[[redirects]]
  from = "/_next/image*"
  to = "/404"
  status = 404

# Next.js specific redirects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables (set these in Netlify UI)
# STOCKDATA_ORG_API_TOKEN=your_api_token_here
